name: Production Direct ECR Deploy

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: jeffin/student-major-project

jobs:
  deploy-to-prod:
    name: Pull from ECR and Deploy to Production
    runs-on: [self-hosted, runner_prod]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy with Docker Compose
        env:
          ECR_REPO_URL: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        run: |
          # 1. Clear out any temporary artifacts and seed the structural vars
          # We write both ECR_REPO_URL and IMAGE_TAG so your compose file handles references cleanly
          echo "ECR_REPO_URL=${ECR_REPO_URL}" > .env
          echo "IMAGE_TAG=latest" >> .env

          # 2. Append your secure production app envs to the runtime profile
          # This ensures your .env.prod contents are preserved alongside the image pointers
          if [ -f .env.prod ]; then
            cat .env.prod >> .env
          fi

          # 3. Pull the latest image variant compiled during the dev phase
          docker compose -f docker-compose.prod.yml pull

          # 4. Bring down stale/orphaned configurations if they exist
          docker compose -f docker-compose.prod.yml down --remove-orphans

          # 5. Spin up the container on port 80, forcing recreation
          docker compose -f docker-compose.prod.yml up -d --force-recreate
