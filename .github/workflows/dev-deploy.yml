name: Build, Push to ECR, and Deploy

on:
  push:
    branches: [ dev ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: jeffin/student-major-project

jobs:
  build-and-push:
    name: Build and Push
    runs-on: [self-hosted, runner_dev]
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

  deploy-to-dev:
    name: Deploy Container via Docker Compose
    needs: build-and-push
    runs-on: [self-hosted, runner_prod]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. ADD THIS: Authenticate the deploy shell environment with AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. ADD THIS: Run the ECR helper to authenticate local Docker CLI daemon
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. RUN COMPOSE: Now docker has the basic auth credentials to pull the image
      - name: Deploy with Docker Compose
        env:
          ECR_REPO_URL: ${{ needs.build-and-push.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        run: |
          export ECR_REPO_URL=$ECR_REPO_URL
          
          # Using "docker compose" without the hyphen as per modern configurations
          docker compose -f docker-compose.dev.yml pull
          docker compose -f docker-compose.dev.yml up -d
